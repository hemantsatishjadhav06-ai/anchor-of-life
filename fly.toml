# Fly.io configuration for Anchor of Life
# Deploy with: fly launch (first time) then fly deploy
# Mumbai region for low latency to primary audience.

app = "anchoroflife"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/anchor.db"
  SITE_URL = "https://anchoroflife.com"
  EMBEDDING_MODEL = "openai/text-embedding-3-small"
  COMPOSER_MODEL = "anthropic/claude-sonnet-4.5"

# Persistent volume for the SQLite database.
[mounts]
  source = "anchor_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"     # save money — stop when idle
  auto_start_machines = true       # wake on first request
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Daily backup — uploads anchor.db to R2 every midnight UTC
[[services.tcp_checks]]
  port = 3000
  interval = "30s"
  timeout = "5s"
